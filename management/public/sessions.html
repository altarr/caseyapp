<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phantom Recall — Sessions</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-logo">Phantom Recall</a>
  <a href="/">Dashboard</a>
  <a href="/badges.html">Badge Training</a>
  <a href="/sessions.html" class="active">Sessions</a>
  <a href="/contacts.html">Contacts</a>
  <a href="/tracking.html">Booth Tracking</a>
  <a href="/users.html">Users</a>
  <div style="margin-left:auto;display:flex;align-items:center;gap:0.75rem">
    <span class="nav-user" style="color:var(--text-muted);font-size:0.8rem"></span>
    <a href="#" class="nav-logout btn btn-outline btn-sm" style="padding:6px 12px">Logout</a>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h1>Sessions</h1>
    <p>Import and review demo session recordings from S3</p>
  </div>

  <div class="card">
    <h2>Import from S3</h2>
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" id="import-all-btn">Import All New Sessions</button>
      <button class="btn btn-outline btn-sm" id="refresh-btn">Refresh List</button>
      <button class="btn btn-outline btn-sm" id="export-btn" style="border-color:var(--green);color:var(--green)">Export Package (CSV)</button>
      <button class="btn btn-sm" style="background:var(--error);color:#fff" id="clear-all-btn">Clear All Sessions</button>
    </div>
    <div id="import-status" style="margin-top:0.75rem"></div>
  </div>

  <div class="card">
    <h2>Imported Sessions</h2>
    <table class="table" id="sessions-table">
      <thead>
        <tr>
          <th>Session ID</th>
          <th>Visitor</th>
          <th>Company</th>
          <th>Screenshots</th>
          <th>Audio</th>
          <th>Analyzed</th>
          <th>Contact Match</th>
          <th>Imported</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="sessions-body">
        <tr><td colspan="7" style="color:var(--text-dim)">No sessions imported</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Session Detail Modal -->
  <div id="detail-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(4px);z-index:1000;overflow-y:auto;padding:2rem">
    <div class="card" style="max-width:900px;margin:0 auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <h2 id="detail-title" style="margin:0">Session</h2>
        <button class="btn btn-outline btn-sm" id="close-detail">Close</button>
      </div>
      <div id="detail-content"></div>
    </div>
  </div>
</div>

<script>
(function() {
  function api(method, path, body) {
    var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    return fetch('/api' + path, opts).then(function(r) { return r.json(); });
  }

  function loadSessions() {
    api('GET', '/sessions').then(function(data) {
      var tbody = document.getElementById('sessions-body');
      if (!data.sessions.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="color:var(--text-dim)">No sessions imported</td></tr>';
        return;
      }
      tbody.innerHTML = data.sessions.map(function(s) {
        var matchBadge = s.contact_id
          ? '<span class="badge badge-green">' + Math.round(s.match_confidence*100) + '%</span> ' + (s.contact_name||'')
          : '<span class="badge badge-amber">Unmatched</span>';
        return '<tr data-sid="' + s.session_id + '">' +
          '<td style="font-family:monospace;font-size:0.8rem;cursor:pointer" class="session-click">' + s.session_id + '</td>' +
          '<td style="cursor:pointer" class="session-click">' + (s.visitor_name||'-') + '</td>' +
          '<td style="cursor:pointer" class="session-click">' + (s.visitor_company||'-') + '</td>' +
          '<td>' + s.screenshot_count + '</td>' +
          '<td>' + (s.has_audio ? '<span class="badge badge-green">Yes</span>' : s.audio_opted_out ? '<span class="badge badge-red">Opted out</span>' : '<span class="badge badge-amber">No</span>') + '</td>' +
          '<td>' + (s.status === 'analyzed' ? '<span class="badge badge-green">Yes</span>' : '<span class="badge" style="background:rgba(136,136,136,0.15);color:#888">No</span>') + '</td>' +
          '<td>' + matchBadge + '</td>' +
          '<td style="font-size:0.8rem;color:var(--text-muted)">' + (s.imported_at||'') + '</td>' +
          '<td><button class="btn btn-outline btn-sm" style="border-color:var(--error);color:var(--error);padding:4px 8px;font-size:10px" onclick="event.stopPropagation();deleteSession(\'' + s.session_id + '\')">Delete</button></td>' +
          '</tr>';
      }).join('');
    });
  }

  document.getElementById('import-all-btn').addEventListener('click', function() {
    var btn = this;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Importing...';
    var status = document.getElementById('import-status');

    api('POST', '/sessions/import-all', { event_id: null }).then(function(data) {
      btn.disabled = false;
      btn.textContent = 'Import All New Sessions';
      status.innerHTML = '<span class="badge badge-green">' + data.imported + ' imported</span>';
      if (data.errors) status.innerHTML += ' <span class="badge badge-red">' + data.errors + ' errors</span>';
      loadSessions();
    }).catch(function(err) {
      btn.disabled = false;
      btn.textContent = 'Import All New Sessions';
      status.innerHTML = '<span class="badge badge-red">Error: ' + err.message + '</span>';
    });
  });

  document.getElementById('refresh-btn').addEventListener('click', loadSessions);

  document.getElementById('export-btn').addEventListener('click', function() {
    window.location.href = '/api/sessions/export-csv';
  });

  // Clear all sessions
  document.getElementById('clear-all-btn').addEventListener('click', function() {
    if (!confirm('Are you sure you want to delete ALL sessions from S3 and the database? This cannot be undone.')) return;
    if (!confirm('Really sure? This deletes all session data permanently.')) return;
    var btn = this;
    btn.disabled = true;
    btn.textContent = 'Clearing...';
    api('POST', '/sessions/clear-all').then(function(data) {
      btn.disabled = false;
      btn.textContent = 'Clear All Sessions';
      if (data.error) { alert('Error: ' + data.error); return; }
      document.getElementById('import-status').innerHTML = '<span class="badge badge-green">' + data.deleted + ' objects deleted</span>';
      loadSessions();
    });
  });

  // Session detail
  document.getElementById('sessions-body').addEventListener('click', function(e) {
    if (!e.target.classList.contains('session-click')) return;
    var tr = e.target.closest('tr[data-sid]');
    if (!tr) return;
    var sid = tr.dataset.sid;
    showDetail(sid);
  });

  document.getElementById('close-detail').addEventListener('click', function() {
    document.getElementById('detail-overlay').style.display = 'none';
  });

  function showDetail(sid) {
    document.getElementById('detail-overlay').style.display = 'block';
    document.getElementById('detail-title').textContent = 'Session ' + sid;
    var content = document.getElementById('detail-content');
    content.innerHTML = '<span class="spinner"></span> Loading...';

    api('GET', '/sessions/' + sid).then(function(data) {
      var s = data.session;
      if (!s) { content.innerHTML = '<p>Session not found</p>'; return; }

      var html = '<div style="margin-bottom:1rem">' +
        '<p><strong>Visitor:</strong> ' + (s.visitor_name||'-') + '</p>' +
        '<p><strong>Company:</strong> ' + (s.visitor_company||'-') + '</p>' +
        '<p><strong>Screenshots:</strong> ' + s.screenshot_count + '</p>' +
        '<p><strong>Audio:</strong> ' + (s.has_audio ? 'Yes' : s.audio_opted_out ? 'Opted out' : 'No') + '</p>' +
        '</div>';

      // Audio player
      if (s.has_audio) {
        html += '<h3 style="color:var(--red);font-size:0.85rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin:1rem 0 0.5rem">Audio</h3>';
        html += '<audio controls style="width:100%;max-width:500px"><source src="/api/sessions/' + sid + '/audio/recording.m4a" type="audio/mp4"><source src="/api/sessions/' + sid + '/audio/recording.wav" type="audio/wav">No audio support</audio>';
      }

      // Screenshot thumbnails — load actual filenames from API
      if (s.screenshot_count > 0) {
        html += '<h3 style="color:var(--red);font-size:0.85rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin:1rem 0 0.5rem">Screenshots (' + s.screenshot_count + ')</h3>';
        html += '<div id="screenshot-grid" style="display:flex;flex-wrap:wrap;gap:8px">Loading...</div>';

        // Fetch actual filenames
        api('GET', '/sessions/' + sid + '/screenshots').then(function(sdata) {
          var grid = document.getElementById('screenshot-grid');
          if (!sdata.files || !sdata.files.length) { grid.innerHTML = '<p style="color:var(--text-dim)">No screenshots found on server</p>'; return; }
          grid.innerHTML = sdata.files.map(function(fname) {
            return '<img src="/api/sessions/' + sid + '/screenshots/' + fname + '" style="width:150px;height:auto;border-radius:6px;border:1px solid var(--border);cursor:pointer" onclick="window.open(this.src)" title="' + fname + '">';
          }).join('');
        });
      }

      // Matches
      if (data.matches && data.matches.length) {
        html += '<h3 style="color:var(--red);font-size:0.85rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin:1rem 0 0.5rem">Contact Matches</h3>';
        html += '<table class="table"><thead><tr><th>Contact</th><th>Email</th><th>Confidence</th><th>Reasoning</th></tr></thead><tbody>';
        data.matches.forEach(function(m) {
          html += '<tr><td>' + m.first_name + ' ' + m.last_name + '</td><td>' + m.email + '</td>' +
            '<td>' + Math.round(m.match_confidence*100) + '%</td><td style="font-size:0.8rem;color:var(--text-muted)">' + (m.match_reasoning||'') + '</td></tr>';
        });
        html += '</tbody></table>';
      }

      // Analyze button + summary
      html += '<div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border)">';
      html += '<div style="display:flex;gap:0.75rem;align-items:center;margin-bottom:1rem">';
      html += '<button class="btn btn-primary btn-sm" id="analyze-btn" onclick="analyzeSession(\'' + sid + '\')">Analyze with AI</button>';
      html += '<span id="analyze-status" style="font-size:0.85rem;color:var(--text-muted)"></span>';
      html += '</div>';
      html += '<pre id="summary-text" style="background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:1rem;font-size:0.85rem;color:var(--text);white-space:pre-wrap;word-wrap:break-word;display:none;max-height:500px;overflow-y:auto"></pre>';
      html += '</div>';

      content.innerHTML = html;

      // Load existing summary if available
      api('GET', '/sessions/' + sid + '/summary').then(function(sdata) {
        if (sdata.summary) {
          document.getElementById('summary-text').textContent = sdata.summary;
          document.getElementById('summary-text').style.display = 'block';
          document.getElementById('analyze-btn').textContent = 'Re-analyze';
          document.getElementById('analyze-status').textContent = 'Analysis complete';
        }
      }).catch(function() {});
    });
  }

  window.deleteSession = function(sid) {
    if (!confirm('Delete session ' + sid + '? This removes it from S3 and the database.')) return;
    api('DELETE', '/sessions/' + sid).then(function(data) {
      if (data.error) { alert(data.error); return; }
      loadSessions();
    });
  };

  window.analyzeSession = function(sid) {
    var btn = document.getElementById('analyze-btn');
    var status = document.getElementById('analyze-status');
    var summaryEl = document.getElementById('summary-text');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Analyzing...';
    status.textContent = 'Sending screenshots + audio to Claude...';

    api('POST', '/sessions/' + sid + '/analyze').then(function() {
      // Poll for summary
      var poll = setInterval(function() {
        api('GET', '/sessions/' + sid + '/summary').then(function(data) {
          if (data.summary) {
            clearInterval(poll);
            summaryEl.textContent = data.summary;
            summaryEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Re-analyze';
            status.textContent = 'Analysis complete';
          }
        }).catch(function() {});
      }, 3000);

      // Timeout after 2 minutes
      setTimeout(function() { clearInterval(poll); btn.disabled = false; btn.textContent = 'Analyze with AI'; status.textContent = 'Timed out — try again'; }, 120000);
    });
  };

  loadSessions();
})();
</script>
<script src="nav-auth.js"></script>
</body>
</html>
