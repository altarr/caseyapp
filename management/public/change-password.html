<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/brand/digital/logos/icon/favicon.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phantom Recall — Change Password</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center">
  <div class="card" style="max-width:420px;width:100%">
    <div style="text-align:center;margin-bottom:1.5rem">
      <h1 style="font-size:1.3rem;font-weight:700;color:var(--red)">Change Password</h1>
      <p id="subtitle" style="color:var(--text-muted);font-size:0.85rem;margin-top:0.25rem">You must set a new password before continuing</p>
    </div>

    <form id="change-form">
      <div class="form-group" id="current-group" style="display:none">
        <label class="field-label">Current Password</label>
        <input type="password" class="input" id="current-password" autocomplete="current-password">
      </div>
      <div class="form-group">
        <label class="field-label">New Password</label>
        <input type="password" class="input" id="new-password" autocomplete="new-password" required minlength="6" autofocus>
      </div>
      <div class="form-group">
        <label class="field-label">Confirm New Password</label>
        <input type="password" class="input" id="confirm-password" autocomplete="new-password" required>
      </div>
      <div id="error" style="display:none;padding:0.6rem;border-radius:8px;background:rgba(255,107,111,0.1);border:1px solid var(--error);color:var(--error);font-size:0.85rem;margin-bottom:1rem"></div>
      <div id="success" style="display:none;padding:0.6rem;border-radius:8px;background:rgba(34,197,94,0.1);border:1px solid var(--green);color:var(--green);font-size:0.85rem;margin-bottom:1rem"></div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="change-btn">Set New Password</button>
    </form>
  </div>
</div>

<script>
// Check if this is a forced change or voluntary
fetch('/api/auth/me').then(function(r) { return r.json(); }).then(function(data) {
  if (!data.must_change_password) {
    document.getElementById('current-group').style.display = 'block';
    document.getElementById('subtitle').textContent = 'Update your password';
  }
}).catch(function() { window.location.href = '/login.html'; });

document.getElementById('change-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var newPw = document.getElementById('new-password').value;
  var confirmPw = document.getElementById('confirm-password').value;
  var errEl = document.getElementById('error');
  var successEl = document.getElementById('success');
  errEl.style.display = 'none';
  successEl.style.display = 'none';

  if (newPw !== confirmPw) {
    errEl.textContent = 'Passwords do not match';
    errEl.style.display = 'block';
    return;
  }
  if (newPw.length < 6) {
    errEl.textContent = 'Password must be at least 6 characters';
    errEl.style.display = 'block';
    return;
  }

  var btn = document.getElementById('change-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  fetch('/api/auth/change-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      current_password: document.getElementById('current-password').value || undefined,
      new_password: newPw
    })
  })
  .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
  .then(function(res) {
    btn.disabled = false;
    btn.textContent = 'Set New Password';
    if (!res.ok) {
      errEl.textContent = res.data.error || 'Failed';
      errEl.style.display = 'block';
      return;
    }
    successEl.textContent = 'Password changed. Redirecting...';
    successEl.style.display = 'block';
    setTimeout(function() { window.location.href = '/'; }, 1500);
  })
  .catch(function() {
    btn.disabled = false;
    btn.textContent = 'Set New Password';
    errEl.textContent = 'Network error';
    errEl.style.display = 'block';
  });
});
</script>
</body>
</html>
