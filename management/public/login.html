<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phantom Recall — Login</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative">
  <!-- Phantom Recall Logo -->
  <img src="/phantom-recall-logo.png" alt="Phantom Recall" style="height:80px;margin-bottom:2rem">

  <div class="card" style="max-width:400px;width:100%">
    <div style="text-align:center;margin-bottom:2rem">
      <p style="color:var(--text-muted);font-size:0.85rem">Management Console</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label class="field-label">Username</label>
        <input type="text" class="input" id="username" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label class="field-label">Password</label>
        <input type="password" class="input" id="password" autocomplete="current-password" required>
      </div>
      <div id="error" style="display:none;padding:0.6rem;border-radius:8px;background:rgba(255,107,111,0.1);border:1px solid var(--error);color:var(--error);font-size:0.85rem;margin-bottom:1rem"></div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="login-btn">Sign In</button>
    </form>
  </div>

  <!-- TrendAI Logo at bottom -->
  <div style="position:fixed;bottom:2rem;left:50%;transform:translateX(-50%)">
    <img src="/trendai-logo-white.png" alt="TrendAI" style="height:32px;opacity:0.7">
  </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var btn = document.getElementById('login-btn');
  var errEl = document.getElementById('error');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  errEl.style.display = 'none';

  fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      username: document.getElementById('username').value,
      password: document.getElementById('password').value
    })
  })
  .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
  .then(function(res) {
    btn.disabled = false;
    btn.textContent = 'Sign In';
    if (!res.ok) {
      errEl.textContent = res.data.error || 'Login failed';
      errEl.style.display = 'block';
      return;
    }
    if (res.data.must_change_password) {
      window.location.href = '/change-password.html';
    } else {
      window.location.href = '/';
    }
  })
  .catch(function() {
    btn.disabled = false;
    btn.textContent = 'Sign In';
    errEl.textContent = 'Network error';
    errEl.style.display = 'block';
  });
});
</script>
</body>
</html>
