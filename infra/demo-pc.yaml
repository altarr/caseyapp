AWSTemplateFormatVersion: '2010-09-09'
Description: >
  BoothApp Windows demo PC — Windows Server 2022 instance for live Vision One
  demos at trade show booths. Includes Chrome, Node.js 18, ffmpeg, and AWS CLI.

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for RDP password decryption

  AllowedCIDR:
    Type: String
    Default: '0.0.0.0/0'
    Description: CIDR block allowed to RDP in (lock to venue IP at deploy time)
    AllowedPattern: '(\d{1,3}\.){3}\d{1,3}/\d{1,2}'

  InstanceType:
    Type: String
    Default: t3.medium
    Description: EC2 instance type

  WindowsAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base
    Description: Latest Windows Server 2022 AMI (auto-resolved via SSM)

  VolumeSize:
    Type: Number
    Default: 50
    Description: Root EBS volume size in GB

Resources:

  # ── VPC ────────────────────────────────────────────────────────────────────

  DemoVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.100.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: boothapp-demo-vpc
        - Key: Project
          Value: boothapp
        - Key: ManagedBy
          Value: cloudformation

  DemoSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DemoVPC
      CidrBlock: 10.100.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: boothapp-demo-public-subnet
        - Key: Project
          Value: boothapp
        - Key: ManagedBy
          Value: cloudformation

  DemoInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: boothapp-demo-igw
        - Key: Project
          Value: boothapp
        - Key: ManagedBy
          Value: cloudformation

  DemoGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref DemoVPC
      InternetGatewayId: !Ref DemoInternetGateway

  DemoRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref DemoVPC
      Tags:
        - Key: Name
          Value: boothapp-demo-rt
        - Key: Project
          Value: boothapp
        - Key: ManagedBy
          Value: cloudformation

  DemoDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: DemoGatewayAttachment
    Properties:
      RouteTableId: !Ref DemoRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref DemoInternetGateway

  DemoSubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref DemoSubnet
      RouteTableId: !Ref DemoRouteTable

  # ── Security Group ────────────────────────────────────────────────────────

  RDPSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow RDP from specified CIDR
      VpcId: !Ref DemoVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: !Ref AllowedCIDR
          Description: RDP access
      Tags:
        - Key: Name
          Value: boothapp-demo-rdp-sg
        - Key: Project
          Value: boothapp
        - Key: ManagedBy
          Value: cloudformation

  # ── EC2 Instance ──────────────────────────────────────────────────────────

  DemoInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref WindowsAmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      SubnetId: !Ref DemoSubnet
      SecurityGroupIds:
        - !Ref RDPSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: !Ref VolumeSize
            VolumeType: gp3
            Encrypted: true
      UserData:
        Fn::Base64: |
          <powershell>
          Start-Transcript -Path C:\UserDataLog.txt

          # Install Chocolatey
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12
          Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))

          # Refresh PATH so choco is available
          $env:Path = [System.Environment]::GetEnvironmentVariable('Path','Machine') + ';' + [System.Environment]::GetEnvironmentVariable('Path','User')

          # Install Chrome, Node.js 18, ffmpeg, AWS CLI
          choco install -y googlechrome
          choco install -y nodejs --version=18.20.4
          choco install -y ffmpeg
          choco install -y awscli

          # Refresh PATH
          $env:Path = [System.Environment]::GetEnvironmentVariable('Path','Machine') + ';' + [System.Environment]::GetEnvironmentVariable('Path','User')

          # Signal completion
          New-Item -Path C:\BoothAppReady.txt -Value "UserData completed at $(Get-Date)" -Force

          Stop-Transcript
          </powershell>
      Tags:
        - Key: Name
          Value: boothapp-demo-windows
        - Key: Project
          Value: boothapp
        - Key: ManagedBy
          Value: cloudformation

  # ── Elastic IP ────────────────────────────────────────────────────────────

  DemoEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: boothapp-demo-eip
        - Key: Project
          Value: boothapp
        - Key: ManagedBy
          Value: cloudformation

  DemoEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt DemoEIP.AllocationId
      InstanceId: !Ref DemoInstance

# ── Outputs ──────────────────────────────────────────────────────────────────

Outputs:
  InstanceId:
    Description: EC2 instance ID
    Value: !Ref DemoInstance
    Export:
      Name: boothapp-demo-windows-instance-id

  PublicIP:
    Description: Elastic IP address for RDP
    Value: !Ref DemoEIP
    Export:
      Name: boothapp-demo-windows-public-ip

  RDPAddress:
    Description: RDP connection string
    Value: !Sub "${DemoEIP}:3389"
